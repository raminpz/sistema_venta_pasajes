# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check files without UTF-8 BOM
        run: |
          if grep -RIl $'\xEF\xBB\xBF' \
            --exclude-dir=.git \
            --include='*.go' \
            --include='*.mod' \
            --include='*.sum' \
            --include='*.yml' \
            --include='*.yaml' \
            --include='*.md' \
            .; then
            echo "BOM detectado en archivos de texto. Guardar como UTF-8 sin BOM."
            exit 1
          fi

      - name: Set up Go
        needs: check-files
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build
        run: go build -v ./...

      - name: Run tests with filtered coverage
        needs: build
        run: |
          PKGS=$(go list ./... | grep -vE '(^sistema_venta_pasajes/cmd/|^sistema_venta_pasajes/configs$|^sistema_venta_pasajes/pkg$|/domain$|/input$|/util$|/repository$)')
          echo "Packages considered for coverage:"
          echo "$PKGS"
          go test -coverprofile=coverage.out $PKGS

      - name: Check coverage
        needs: run-tests
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: $COVERAGE%"

          REQUIRED=70

          RESULT=$(echo "$COVERAGE >= $REQUIRED" | bc)

          if [ "$RESULT" -ne 1 ]; then
            echo "Coverage is below ${REQUIRED}%"
            exit 1
          fi
